pipeline:
  phase2_bi_encoder:
    model_name: "all-mpnet-base-v2"
    device: "cpu"
    top_n_pool: 1000
    blend_weights:
      rule_score: 0.75
      semantic_score: 0.25
    extraction:
      max_roles: 3
      max_skills: 15

  phase3_cross_encoder:
    model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    device: "cpu"
    top_n_pool: 300
    blend_weights:
      prev_score: 0.70
      semantic_score: 0.30

  output:
    top_k: 100

scoring_weights:
  career_fit: 0.40 # Dropped slightly, but still the massive anchor
  skill_auth: 0.30 # Boosted. They MUST have retrieval/ranking tech depth!
  behavioral: 0.15 # Dropped slightly. (Ghosts are caught by your kill switch anyway)
  logistics: 0.10 # Keeps the math clean for Pune/Hybrid preferences
  education: 0.05 # Slashed. Series A startups rarely care about degrees vs. experience

honeypot:
  dataset_year: 2026

  # 1. The "Time-Traveler" Tech Matrix
  tech_birth_years:
    # -- General GenAI (Your list) --
    chatgpt: 2022
    gpt-4: 2023
    gpt4: 2023
    claude: 2023
    gemini: 2023
    midjourney: 2022
    stable diffusion: 2022

    # -- JD-Specific: LLM Fine-Tuning & Frameworks --
    llm fine-tuning: 2020
    llm fine tuning: 2020
    langchain: 2022
    llamaindex: 2022
    llama-index: 2022
    lora: 2021
    qlora: 2023
    peft: 2022
    rag: 2020
    retrieval-augmented generation: 2020

    # -- JD-Specific: Open Source Models --
    llama: 2023
    mistral: 2023
    mixtral: 2023

    # -- JD-Specific: Vector Databases --
    pinecone: 2021
    qdrant: 2021
    weaviate: 2019
    milvus: 2019

    # -- Core Architecture Baseline --
    transformers: 2017
  # 2. The "Immortal / Missing Math" Structural Limits
  structural_limits:
    max_single_role_months: 480 # 40 years in one job is a classic anomaly trap
    max_yoe_discrepancy_years: 5.0 # Max difference between Summary YoE and Calculated YoE
    max_pre_graduation_yoe: 4.0 # Max allowed "working through college" years
