pipeline:
  phase2_bi_encoder:
    model_name: "all-mpnet-base-v2"
    device: "cpu"
    top_n_pool: 800
    blend_weights:
      rule_score: 0.60
      semantic_score: 0.40
    extraction:
      max_roles: 4
      max_skills: 15

  phase3_cross_encoder:
    model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    device: "cpu"
    top_n_pool: 200
    blend_weights:
      prev_score: 0.50
      semantic_score: 0.50

  output:
    top_k: 100

scoring_weights:
  career_fit: 0.50
  skill_auth: 0.15
  behavioral: 0.35
  education: 0.00
  logistics: 0.00

